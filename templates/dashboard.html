{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h2>Your Repositories</h2>
</div>

<div class="repo-grid">
    <!-- Connected Repos -->
    {% for repo in connected_repos %}
    <div class="card repo-card">
        <h3><a href="/repo/{{ repo.id }}" style="text-decoration: none; color: var(--primary-color);">{{ repo.repo_name }}</a></h3>
        <span class="badge badge-success">Connected</span>
        <p class="text-muted">ID: {{ repo.id }}</p>
    </div>
    {% else %}
    <p class="text-muted">No repositories connected yet.</p>
    {% endfor %}
</div>

<div class="dashboard-section">
    <h2>Available GitHub Repositories</h2>
    <button class="btn btn-outline" onclick="loadAvailableRepos({{ user.id }})">Load Repositories</button>
    <div id="available-repos-list" class="repo-grid" style="margin-top: 1rem;">
        <!-- Loaded via JS -->
    </div>
</div>
{% endblock %}
